name: Instagram Auto Post

on:
  schedule:
    # JSTの朝7:00 = UTC前日22:00
    - cron: "0 22 * * *"
    # JSTの夜21:00 = UTC同日12:00
    - cron: "0 12 * * *"
  workflow_dispatch:  # 手動実行用

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run post_next.py
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          WP_URL: https://sekai-kotoba.com
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: python3 post_next.py

      - name: Commit logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted.log ig_embed_map.json
          git diff --staged --quiet || git commit -m "log: posted theme $(date +%Y-%m-%d_%H:%M)"
          git push
