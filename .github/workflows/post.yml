name: Instagram Auto Post (Voice + Convo Reel)

on:
  # 2026-04-22: reach急落+save=0 で一時停止。v12 ポップ版の成否判断後に再開予定。
  # 再開手順: 下の schedule ブロックのコメント解除 → commit & push
  # schedule:
  #   # JSTの朝7:00 = UTC前日22:00 → 音声Reel
  #   - cron: "0 22 * * *"
  #   # JSTの夜21:00 = UTC同日12:00 → 会話アニメReel
  #   - cron: "0 12 * * *"
  workflow_dispatch:  # 手動実行用
    inputs:
      type:
        description: "Reel type: voice or convo"
        required: false
        default: "voice"

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Determine reel type
        id: reel_type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "flag=--${{ github.event.inputs.type }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 22 * * *" ]; then
            echo "flag=--voice" >> $GITHUB_OUTPUT
          else
            echo "flag=--convo" >> $GITHUB_OUTPUT
          fi

      - name: Run post_reel_next.py
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: python3 post_reel_next.py ${{ steps.reel_type.outputs.flag }}

      - name: Commit logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reel_posted.log ig_embed_map.json
          git diff --staged --quiet || git commit -m "log: reel posted $(date +%Y-%m-%d_%H:%M)"
          git push
