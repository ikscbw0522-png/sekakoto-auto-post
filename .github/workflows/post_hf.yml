name: Instagram Auto Post (Hyperframes Reel)

# A/Bテスト用：毎日13:00 JSTにHyperframes版Reelを投稿（post.ymlの07:00 voice / 21:00 convoと並走）
# 事前レンダ済テーマの在庫が尽きたら自動停止（publish_hf_next.py が exit 0 する）

on:
  schedule:
    # JSTの13:00 = UTC 04:00
    - cron: "0 4 * * *"
  workflow_dispatch:  # 手動実行

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run publish_hf_next.py
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        working-directory: sekai_kotoba_hf
        run: python3 publish_hf_next.py

      - name: Commit logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reel_posted.log sekai_kotoba_hf/hyperframes_reel_urls.json
          git diff --staged --quiet || git commit -m "log: hyperframes reel posted $(date +%Y-%m-%d_%H:%M)"
          git push
