name: Daily Insights Report

on:
  # 自動実行停止（監査により cron 無効化 2026-06-15）— 手動実行(workflow_dispatch)のみ残す
  # schedule:
  #   # JST 9:00 = UTC 0:00
  #   - cron: "0 0 * * *"
  workflow_dispatch:  # 手動実行用

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run insights report
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: python3 ig_insights_report.py --discord "${{ secrets.DISCORD_WEBHOOK }}"
